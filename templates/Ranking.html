{% extends 'Base.html' %}

{% block title %}Ranking{% endblock %}


{% block content %}

{% include 'components/Nav.html' %}

<div class="flex-1 flex flex-col items-center">
	<p class='text-2xl md:pb-8 pb-4 '>Ranking</p>

<table class='table-auto'>
  <thead>
    <tr>
      <th class='px-2'>#</th>
      <th class='px-2'>Usuário</th>
      <th class='px-2'>Pontos</th>
			<th class='px-2'>Palpites</th>
    </tr>
  </thead>
  <tbody>
  {% for user in rank %}
    <tr>
      <td class='w-8 text-center'>{{ user.position }}</td>
      <td>{{ user.username }}</td>
      <td class='text-center'>{{ user.points }}</td>
			<td class='text-center'>{{ user.guesses }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

</div>

{% endblock %}
